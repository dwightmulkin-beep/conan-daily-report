<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日报列表</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 22px; }
  .header a { color: white; text-decoration: none; font-size: 14px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }
  .section { background: white; border-radius: 12px; padding: 25px 30px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .section-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
  .report-card { display: inline-block; width: calc(25% - 20px); margin: 10px; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
  .report-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(102,126,234,0.3); }
  .report-card .date { font-size: 24px; font-weight: 600; }
  .report-card .weekday { font-size: 14px; opacity: 0.9; margin-top: 5px; }
  .report-card .status { font-size: 12px; margin-top: 15px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; display: inline-block; }
  .empty { text-align: center; color: #999; padding: 40px; }
</style>
</head>
<body>

<div class="header">
  <h1>📝 日报列表</h1>
  <a href="../index.html">← 返回总览</a>
</div>

<div class="container">

  <div class="section">
    <div class="section-title">全部日报</div>

    <a class="report-card" href="2026-03-24.html">
      <div class="date">03-24</div>
      <div class="weekday">周二</div>
      <div class="status">最新</div>
    </a>

    <div class="empty" style="display:inline-block;width:calc(25% - 20px);margin:10px;padding:20px;background:#f5f5f5;border-radius:10px;color:#999;">
      <div>暂无</div>
    </div>

  </div>

</div>

</body>
</html>
