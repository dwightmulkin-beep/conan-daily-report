<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会议纪要</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 22px; }
  .header a { color: white; text-decoration: none; font-size: 14px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }
  .section { background: white; border-radius: 12px; padding: 25px 30px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .section-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
  .meeting-item { padding: 20px 0; border-bottom: 1px solid #eee; }
  .meeting-item:last-child { border-bottom: none; }
  .meeting-meta { font-size: 12px; color: #999; margin-bottom: 8px; }
  .meeting-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 10px; }
  .meeting-content { font-size: 14px; color: #666; line-height: 1.8; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 10px; }
  .tag-blue { background: #e6f7ff; color: #1890ff; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 会议纪要</h1>

</div>

<div class="container">

  </div>

</div>

</body>
</html>
