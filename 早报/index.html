<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>早报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; }
  .header h1 { font-size: 22px; }
  .header a { color: white; text-decoration: none; font-size: 14px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }
  .section { background: white; border-radius: 12px; padding: 25px 30px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .section-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
  .greeting { font-size: 24px; margin-bottom: 20px; }
  .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .info-card { background: #f8f9fa; padding: 20px; border-radius: 8px; }
  .info-card h3 { font-size: 14px; color: #666; margin-bottom: 10px; }
  .info-card .value { font-size: 18px; font-weight: 600; color: #333; }
  ul { padding-left: 20px; line-height: 2; }
  li { margin: 5px 0; }
</style>
</head>
<body>

<div class="header">

</div>

      <h3>今日日期</h3>

    </div>
    <div class="info-card">
      <h3>今日培训建议</h3>
      <div class="value">完成1.1+1.2课程</div>
    </div>
  </div>

  <div class="section" style="margin-top:20px;">
    <div class="section-title">📋 今日待办</div>
    <ul>
      <li>培训进度确认 - 完成第一阶段产品基础课程</li>
      <li>查看学员反馈 - 3条新反馈待处理</li>
      <li>行业资讯阅读 - 了解最新市场动态</li>
    </ul>
  </div>

  <div class="section">
    <div class="section-title">💡 今日重点关注</div>
    <ul>
      <li><strong>亚马逊新政策：</strong>多账号保护政策变化，关注账号关联风险</li>
      <li><strong>TikTok Shop：</strong>美国市场扩张，本土化运营需求增加</li>
      <li><strong>培训系统：</strong>继续完善课程内容，录入更多G盘资料</li>
    </ul>
  </div>

</div>

</body>
</html>
