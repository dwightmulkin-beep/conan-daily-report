<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛠️ 工具箱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 22px; }
  .header a { color: white; text-decoration: none; font-size: 14px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 30px 40px; }
  .section { background: white; border-radius: 12px; padding: 25px 30px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .section-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
  
  .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .tool-card { background: #f8f9fa; border-radius: 12px; padding: 25px; text-decoration: none; display: block; transition: all 0.2s; border: 2px solid transparent; }
  .tool-card:hover { background: #667eea; color: white; border-color: #667eea; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(102,126,234,0.2); }
  .tool-card .icon { font-size: 36px; margin-bottom: 15px; }
  .tool-card .name { font-size: 18px; font-weight: 600; color: inherit; margin-bottom: 8px; }
  .tool-card .desc { font-size: 13px; color: #666; line-height: 1.6; }
  .tool-card:hover .desc { color: rgba(255,255,255,0.85); }
  .tool-card .arrow { float: right; font-size: 20px; opacity: 0.5; margin-top: -30px; }
</style>
</head>
<body>

<div class="header">
  <h1>🛠️ 工具箱</h1>
  <a href="../index.html">← 返回首页</a>
</div>

<div class="container">

  <div class="section">
    <div class="section-title">🖼️ 内容生成工具</div>
    <div class="tool-grid">
      <a class="tool-card" href="图片新闻生成/">
        <div class="icon">🖼️</div>
        <div class="name">文本转图片新闻</div>
        <div class="desc">输入文字内容，一键生成图片式新闻速报。支持多种配色方案，适合分享到朋友圈、小红书、微博等社交平台。</div>
        <div class="arrow">→</div>
      </a>
      <a class="tool-card" href="日报生成/">
        <div class="icon">📊</div>
        <div class="name">日报生成器</div>
        <div class="desc">输入今日工作内容，自动生成格式化的日报。支持一键复制，方便快速提交工作汇报。</div>
        <div class="arrow">→</div>
      </a>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🔧 开发中...</div>
    <div class="tool-grid">
      <div class="tool-card" style="opacity:0.5;cursor:not-allowed;">
        <div class="icon">📈</div>
        <div class="name">数据图表生成</div>
        <div class="desc">输入数据，自动生成图表图片（开发中）</div>
      </div>
      <div class="tool-card" style="opacity:0.5;cursor:not-allowed;">
        <div class="icon">📑</div>
        <div class="name">话术模板库</div>
        <div class="desc">销售话术模板，支持一键复制（开发中）</div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
