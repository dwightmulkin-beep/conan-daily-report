<script>
var SD=JSON.parse(document.getElementById("sd").textContent||"{}");

function openImg(){document.getElementById('mo').classList.add('on');document.body.style.overflow='hidden'}
function closeImg(){document.getElementById('mo').classList.remove('on');document.body.style.overflow=''}
function closeMd(){document.getElementById('md').classList.remove('on');document.body.style.overflow=''}

function snapHtml(arts){
  var h='<ul class="nl">';
  arts.forEach(function(a,i){
    var cls=a.tag==="\u884c\u4e1a\u653f\u7b56"?"tagR":a.tag==="\u5e02\u573a\u89c2\u5bdf"?"tagO":
           a.tag==="\u5e73\u53f0\u52a8\u6001"?"tagB":a.tag==="\u5de5\u5177\u8bc4\u6d4b"?"tagV":
           a.tag==="\u652f\u4ed8\u91d1\u878d"?"tagG":"tagGr";
    h+='<li class="ni"><div class="nn">'+(i+1)+'</div><div class="nc">'+
      '<div class="nm"><span class="tag '+cls+'">'+a.tag+'</span></div>'+
      '<div class="nt"><a href="'+a.url+'" target="_blank">'+a.title+'</a></div>'+
      '<div class="nd">'+a.desc+'</div>'+
      '<div class="ns">&#128214; <a href="'+a.url+'" target="_blank">'+a.source+'</a> <a class="nlk" href="'+a.url+'" target="_blank">&#8594;</a></div>'+
    '</div></li>';
  });
  return h+'</ul>';
}

function loadSnap(ds,hr){
  var snap=SD[ds]&&SD[ds][hr];
  if(!snap){alert("\u6570\u636e\u4e0d\u5b58\u5728");return}
  var arts=snap.articles||[];
  document.getElementById('mdT').textContent=ds+' '+hr+':00 ('+arts.length+'\u6761)';
  document.getElementById('mdB').innerHTML=snapHtml(arts);
  document.getElementById('md').classList.add('on');
  document.body.style.overflow='hidden';
}

document.addEventListener('keydown',function(e){
  if(e.key==="Escape"){closeMd();closeImg()}
});
</script>
