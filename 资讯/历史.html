<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📁 历史存档</title>
<style>
  :root {
    --primary: #667eea; --primary-dark: #5a6fd6; --purple: #764ba2;
    --text: #1a1a2e; --text-secondary: #4a4a6a; --text-muted: #9090a0;
    --bg: #f4f5f9; --card: #ffffff; --border: #e8e9f0;
    --tag-blue-bg: #e8f4ff; --tag-blue-text: #2b7cd6;
    --tag-green-bg: #edfben; --tag-green-text: #2a9d3a;
    --tag-orange-bg: #fff3e8; --tag-orange-text: #d4700a;
    --tag-purple-bg: #f3eeff; --tag-purple-text: #7c3aed;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    --shadow-hover: 0 4px 12px rgba(102,126,234,.15), 0 8px 32px rgba(0,0,0,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
  a{color:inherit;text-decoration:none}

  .header{background:linear-gradient(135deg,var(--primary) 0%,var(--purple) 100%);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(102,126,234,.3)}
  .header h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
  .header-right{display:flex;align-items:center;gap:20px}
  .header-link{font-size:13px;color:rgba(255,255,255,.9)}
  .header-link:hover{opacity:.7}

  .container{max-width:900px;margin:0 auto;padding:32px 24px}

  .top-actions{display:flex;gap:12px;margin-bottom:24px}
  .action-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;font-size:13px;font-weight:600;color:var(--text-secondary);transition:all .2s;box-shadow:var(--shadow)}
  .action-btn:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-1px)}
  .action-btn.primary{background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;border:none;box-shadow:0 4px 16px rgba(102,126,234,.3)}

  .card{background:var(--card);border-radius:16px;padding:28px 32px;margin-bottom:20px;box-shadow:var(--shadow)}

  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .card-title{font-size:15px;font-weight:700;color:var(--text)}
  .card-meta{font-size:12px;color:var(--text-muted)}
  .card-badge{font-size:11px;background:var(--primary);color:#fff;padding:2px 10px;border-radius:10px;margin-left:8px}

  .date-group{margin-bottom:28px}
  .date-label{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border)}
  .date-items{}

  .history-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;border-radius:8px;transition:background .15s}
  .history-item:last-child{border-bottom:none}
  .history-item:hover{background:rgba(102,126,234,.04)}
  .hi-time{width:64px;flex-shrink:0;text-align:center}
  .hi-hour{font-size:16px;font-weight:700;color:var(--text)}
  .hi-date{font-size:11px;color:var(--text-muted)}
  .hi-info{flex:1;min-width:0}
  .hi-count{font-size:12px;font-weight:600;color:var(--primary);margin-bottom:2px}
  .hi-preview{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hi-tags{display:flex;gap:4px;flex-wrap:wrap;max-width:160px}
  .mini-tag{font-size:10px;background:var(--bg);color:var(--text-muted);padding:2px 8px;border-radius:8px;white-space:nowrap}
  .hi-btn{padding:5px 12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
  .hi-btn:hover{background:var(--primary-dark);transform:scale(1.03)}

  .news-item{display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--border)}
  .news-item:last-child{border-bottom:none;padding-bottom:0}
  .news-item:first-child{padding-top:0}
  .news-num{width:28px;height:28px;background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
  .news-body{flex:1;min-width:0}
  .news-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .tag{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600}
  .tag-blue{background:var(--tag-blue-bg);color:var(--tag-blue-text)}
  .tag-green{background:var(--tag-green-bg);color:var(--tag-green-text)}
  .tag-orange{background:var(--tag-orange-bg);color:var(--tag-orange-text)}
  .tag-purple{background:var(--tag-purple-bg);color:var(--tag-purple-text)}
  .news-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:5px}
  .news-title a{color:inherit;text-decoration:none}
  .news-title a:hover{color:var(--primary)}
  .news-desc{font-size:13px;color:var(--text-secondary);line-height:1.65;margin-bottom:5px}
  .news-source{font-size:12px;color:var(--text-muted)}
  .news-link{color:var(--primary);font-weight:600;margin-left:4px}
  .cur-badge{display:inline-block;background:#22c55e;color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;margin-left:6px}

  .snapshot-card{background:var(--card);border-radius:16px;padding:24px 28px;margin-bottom:20px;box-shadow:var(--shadow);display:none}
  .snapshot-card.show{display:block}
  .snapshot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .snapshot-title{font-size:15px;font-weight:700;color:var(--text)}
  .snapshot-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
  .snapshot-close{padding:6px 14px;background:var(--bg);color:var(--text-secondary);border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}

  .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:32px}
  .modal.on{display:flex}
  .modal-close{position:fixed;top:24px;right:28px;color:#fff;font-size:28px;cursor:pointer;width:44px;height:44px;background:rgba(255,255,255,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .modal-close:hover{background:rgba(255,255,255,.22)}
  .modal-img{max-width:90vw;max-height:85vh;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
  .modal-save{position:fixed;bottom:28px;right:28px}
  .modal-save a{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--primary);padding:11px 22px;border-radius:25px;font-size:14px;font-weight:700;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:transform .2s}
  .modal-save a:hover{transform:scale(1.04)}
  .modal-tip{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.45);font-size:12px}
  .empty{text-align:center;padding:40px 0;color:var(--text-muted);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <h1>📁 行业资讯历史存档</h1>
  <div class="header-right">
    <span class="header-time">🕒 北京时间</span>
    <a class="header-link" href="index.html">← 今日简报</a>
  </div>
</div>

<div class="container">
  <div class="top-actions">
    <a class="action-btn primary" href="index.html">📰 今日简报</a>
    <a class="action-btn" href="#" onclick="openMo();return false;">🖼️ 简报图片</a>
  </div>

  <!-- 快照查看器 -->
  <div class="snapshot-card" id="snapCard">
    <div class="snapshot-header">
      <div>
        <div class="snapshot-title" id="snapTtl">--:--</div>
        <div class="snapshot-sub" id="snapSub"></div>
      </div>
      <button class="snapshot-close" onclick="closeSnap()">关闭</button>
    </div>
    <div id="snapBody"></div>
  </div>

  <!-- 日期分组列表 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">📁 历史存档</div>
      <div class="card-meta">最多保留7天</div>
    </div>
    <div id="historyList">
      <div class="date-group">
  <div class="date-label">2026-03-25 周三</div>
  <div class="date-items"><div class="history-item" onclick="loadSnap('2026-03-25', '11')">
  <div class="hi-time">
    <div class="hi-hour">11:00</div>
    <div class="hi-date">2026-03-25</div>
  </div>
  <div class="hi-info">
    <div class="hi-count">5 条资讯</div>
    <div class="hi-preview">卖家注意！亚马逊2026年战略要点，我们帮你捋清楚了-雨果网...</div>
  </div>
  <div class="hi-tags"><span class="mini-tag">电商平台</span><span class="mini-tag">社媒电商</span><span class="mini-tag">支付通道</span></div>
  <button class="hi-btn">查看</button>
</div></div>
</div>
    </div>
  </div>
</div>

<!-- 弹窗 -->
<div class="modal" id="mo">
  <div class="modal-close" onclick="closeMo()">×</div>
  <img class="modal-img" src="https://dwightmulkin-beep.github.io/conan-daily-report/%E8%B5%84%E8%AE%AF/%E7%AE%80%E6%8A%A5.png" alt="简报图片">
  <div class="modal-save">
    <a href="https://dwightmulkin-beep.github.io/conan-daily-report/%E8%B5%84%E8%AE%AF/%E7%AE%80%E6%8A%A5.png" download="行业简报.png">⬇ 保存图片</a>
  </div>
  <div class="modal-tip">点击 × 或按 ESC 关闭</div>
</div>

<script type="application/json" id="snapData">{"2026-03-25": {"11": {"articles": [{"tag": "电商平台", "title": "卖家注意！亚马逊2026年战略要点，我们帮你捋清楚了-雨果网", "desc": "亚马逊发布2026年四大业务战略。", "date": "2026-03-25", "hour": "11", "url": "https://www.cifnews.com/article/181436", "source": "www.cifnews.com", "is_new": true, "score": 5}, {"tag": "社媒电商", "title": "2026年TikTok Shop开店全攻略-飞跨浏览器", "desc": "2026年TikTok全球月活超30亿（Statista），TikTok Shop成中国卖家海外布局关键。本文拆解开店全流程，分享飞跨浏览器解决网络/安全痛点，助高效开启TikTok电商掘金之旅。", "date": "2026-03-25", "hour": "11", "url": "https://www.feikua.net/doc/3635.html", "source": "www.feikua.net", "is_new": true, "score": 5}, {"tag": "支付通道", "title": "3月23日外贸早报—XTransfer", "desc": "XTransfer作为一站式外贸企业跨境金融和风控服务公司，为从事跨境电商B2B的中小微出口企业提供跨境收款平台服务。XTransfer提供的外贸收款方式，让中小微企业享受到和大型跨国集团企业同等水平的跨境金融服务！", "date": "2026-03-25", "hour": "11", "url": "https://www.xtransfer.cn/c/LABBxM", "source": "www.xtransfer.cn", "is_new": true, "score": 2}, {"tag": "社媒电商", "title": "TikTok Shop政策更新：2026美国市场本土化运营实操指南", "desc": "TikTok Shop美国站正在加速扩张，平台政策向本土化运营倾斜，多账号矩阵运营和IP隔离需求持续增长。", "date": "2026-03-25", "url": "https://www.shoplazza.cn/blog/tiktok-shop-policy-update", "source": "Shoplazza·店小秘", "is_new": false, "hour": "11", "score": 7}, {"tag": "电商平台", "title": "月活超6.5亿！亚马逊仍是出海主航道，这几点卖家们要避坑", "desc": "Similarweb数据显示亚马逊以6.517亿月活稳居全球电商第一。平台合规与风控要求严苛，文章总结了三类常见踩坑及应对方案。", "date": "2026-03-25", "url": "https://www.sohu.com/a/998377667_120987862", "source": "搜狐财经", "is_new": false, "hour": "11", "score": 4}], "updated": "2026-03-25 11:54"}}}</script>
<script>
var modal=document.getElementById('mo');
function openMo(){modal.classList.add('on');document.body.style.overflow='hidden'}
function closeMo(){modal.classList.remove('on');document.body.style.overflow=''}
modal.addEventListener('click',function(e){if(e.target===modal)closeMo()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeMo()});
var allSnaps=JSON.parse(document.getElementById('snapData').textContent||'{}');
var snapCard=document.getElementById('snapCard');

function loadSnap(date,h){
  if(!allSnaps[date]||!allSnaps[date][h]){alert('数据不存在');return}
  var snap=allSnaps[date][h];
  document.getElementById('snapTtl').textContent=date+' '+h+':00';
  document.getElementById('snapSub').textContent=snap.articles.length+' 条资讯';
  var html='<ul style="list-style:none;margin:0;padding:0">';
  snap.articles.forEach(function(a,i){
    var cls=a.tag==='电商平台'?'tag-blue':a.tag==='社媒电商'||a.tag==='行业观察'?'tag-green':a.tag==='支付通道'?'tag-orange':'tag-purple';
    html+='<li class="news-item"><div class="news-num">'+(i+1)+'</div><div class="news-body"><div class="news-meta"><span class="tag '+cls+'">'+a.tag+'</span></div><div class="news-title"><a href="'+a.url+'" target="_blank">'+a.title+'</a></div><div class="news-desc">'+a.desc+'</div><div class="news-source">📌 '+a.source+' <a class="news-link" href="'+a.url+'" target="_blank">→ 阅读原文</a></div></div></li>';
  });
  html+='</ul>';
  document.getElementById('snapBody').innerHTML=html;
  snapCard.classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
}
function closeSnap(){snapCard.classList.remove('show')}
</script>
</body>
</html>
