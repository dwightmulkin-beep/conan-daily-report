<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>历史存档</title>
<style>
:root{--p:#667eea;--pp:#764ba2;--txt:#1a1a2e;--txt2:#4a4a6a;--mut:#9090a0;--bg:#f4f5f9;--c:#fff;--bd:#e8e9f0;--r-bg:#fff1f0;--r-tx:#cf1322;--o-bg:#fff7e6;--o-tx:#d46b08;--b-bg:#e6f7ff;--b-tx:#0958d9;--v-bg:#f9f0ff;--v-tx:#722ed1;--g-bg:#f6ffed;--g-tx:#389e0d;--gr-bg:#f5f5f5;--gr-tx:#595959;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);--sh-h:0 4px 12px rgba(102,126,234,.15),0 8px 32px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);line-height:1.6}
a{color:inherit;text-decoration:none}
.hh{background:linear-gradient(135deg,var(--p) 0%,var(--pp) 100%);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(102,126,234,.3)}
.hh h1{font-size:18px;font-weight:700;color:#fff}
.hh-r{display:flex;align-items:center;gap:20px}
.hh a{font-size:13px;color:rgba(255,255,255,.9)}
.hh a:hover{opacity:.7}
.hh-t{font-size:12px;color:rgba(255,255,255,.75)}
.ct{max-width:1100px;margin:0 auto;padding:32px 40px}
.tA{display:flex;gap:12px;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:var(--c);border:1.5px solid var(--bd);border-radius:12px;font-size:13px;font-weight:600;color:var(--txt2);text-decoration:none;transition:all .2s;box-shadow:var(--sh)}
.btn:hover{border-color:var(--p);color:var(--p);transform:translateY(-1px);box-shadow:var(--sh-h)}
.btnP{background:linear-gradient(135deg,var(--p),var(--pp));color:#fff;border:none;box-shadow:0 4px 16px rgba(102,126,234,.3)}
.card{background:var(--c);border-radius:16px;padding:28px 32px;margin-bottom:20px;box-shadow:var(--sh)}
.dg{margin-bottom:28px}
.dl{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--bd)}
.hi{display:flex;gap:14px;padding:11px 0;border-bottom:1px solid var(--bd);align-items:center;cursor:pointer;border-radius:8px;transition:background .15s}
.hi:last-child{border-bottom:none}
.hi:hover{background:rgba(102,126,234,.04)}
.hiT{width:64px;flex-shrink:0;text-align:center}
.hiH{font-size:15px;font-weight:700;color:var(--txt)}
.hiD{font-size:11px;color:var(--mut)}
.hiI{flex:1;min-width:0}
.hiC{font-size:12px;font-weight:600;color:var(--p);margin-bottom:2px}
.hiP{font-size:12px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hiTs{display:flex;gap:4px;flex-wrap:wrap;max-width:150px}
.mtag{font-size:10px;background:var(--bg);color:var(--mut);padding:2px 8px;border-radius:8px;white-space:nowrap}
.hiB{padding:5px 12px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.hiB:hover{background:var(--pp);transform:scale(1.03)}
.nl{list-style:none;margin:0;padding:0}
.ni{display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--bd)}
.ni:last-child{border-bottom:none;padding-bottom:0}
.ni:first-child{padding-top:0}
.nn{width:28px;height:28px;background:linear-gradient(135deg,var(--p),var(--pp));color:#fff;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.nb{flex:1;min-width:0}
.nm{margin-bottom:5px}
.tag{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600}
.tagR{background:var(--r-bg);color:var(--r-tx)}
.tagO{background:var(--o-bg);color:var(--o-tx)}
.tagB{background:var(--b-bg);color:var(--b-tx)}
.tagV{background:var(--v-bg);color:var(--v-tx)}
.tagG{background:var(--g-bg);color:var(--g-tx)}
.tagGr{background:var(--gr-bg);color:var(--gr-tx)}
.ntitle{font-size:15px;font-weight:600;color:var(--txt);line-height:1.5;margin-bottom:5px}
.ntitle a{color:inherit;text-decoration:none}
.ntitle a:hover{color:var(--p)}
.ndesc{font-size:13px;color:var(--txt2);line-height:1.65;margin-bottom:5px}
.nsrc{font-size:12px;color:var(--mut)}
.nlink{color:var(--p);font-weight:600;margin-left:4px}
.snap{background:var(--c);border-radius:16px;padding:24px 28px;margin-bottom:20px;box-shadow:var(--sh);display:none}
.snapOn{display:block}
.snapH{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.snapTT{font-size:15px;font-weight:700;color:var(--txt)}
.snapSub{font-size:12px;color:var(--mut);margin-top:2px}
.snapCls{padding:6px 14px;background:var(--bg);color:var(--txt2);border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.empty{text-align:center;padding:40px 0;color:var(--mut);font-size:14px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:32px}
.modalOn{display:flex}
.mc{position:fixed;top:24px;right:28px;color:#fff;font-size:28px;cursor:pointer;width:44px;height:44px;background:rgba(255,255,255,.12);border-radius:50%;display:flex;align-items:center;justify-content:center}
.mc:hover{background:rgba(255,255,255,.22)}
.mi{max-width:90vw;max-height:85vh;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.ms{position:fixed;bottom:28px;right:28px}
.ms a{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--p);padding:11px 22px;border-radius:25px;font-size:14px;font-weight:700;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.mt{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.45);font-size:12px}
</style>
</head>

    <div id="snapB"></div>

  <div class="card">

</div>

</div>

<script>
var M=document.getElementById("mo");
function openMo(){M.classList.add("modalOn");document.body.style.overflow="hidden"}
function closeMo(){M.classList.remove("modalOn");document.body.style.overflow=""}
M.addEventListener("click",function(e){if(e.target===M)closeMo()});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeMo()});
var SD=JSON.parse(document.getElementById("sd").textContent||"{}");
var sv=document.getElementById("snapV");
var dates=Object.keys(SD).sort().reverse().slice(0,30);
function getWd(d){var wds=["周日","周一","周二","周三","周四","周五","周六"];return wds[new Date(d).getDay()];}
var dgHtml="";
dates.forEach(function(ds){
  var dd=SD[ds];
  var hrs=Object.keys(dd).sort().reverse();
  var dg="";
  hrs.forEach(function(hr){
    var snap=dd[hr];
    var arts=snap&&snap.articles||[];
    var tags="";
    arts.slice(0,3).forEach(function(a){tags+='<span class="mtag">'+a.tag+'</span>';});
    var ft=(arts[0]&&arts[0].title||"").substring(0,36)+"...";
    dg+='<div class="hi" onclick="loadSnap(\''+ds+'\',\''+hr+'\')">'+
      '<div class="hiT"><div class="hiH">'+hr+':00</div><div class="hiD">'+ds+'</div></div>'+
      '<div class="hiI"><div class="hiC">'+arts.length+'条</div><div class="hiP">'+ft+'</div></div>'+
      '<div class="hiTs">'+tags+'</div>'+
      '<button class="hiB">查看</button></div>';
  });
  dgHtml+='<div class="dg"><div class="dl">'+ds+' '+getWd(ds)+'</div><div class="hiAll">'+dg+'</div></div>';
});
document.getElementById("dgList").innerHTML=dgHtml||'<div class="empty">暂无历史记录</div>';
function loadSnap(ds,hr){
  var snap=SD[ds]&&SD[ds][hr];
  if(!snap){alert("数据不存在");return}
  var arts=snap.articles||[];
  document.getElementById("svT").textContent=ds+" "+hr+":00";
  document.getElementById("svS").textContent=arts.length+" 条资讯";
  var h='<ul class="nl">';
  arts.forEach(function(a,i){
    var cls=a.tag==="行业政策"?"tagR":a.tag==="市场观察"?"tagO":
           a.tag==="平台动态"?"tagB":a.tag==="工具评测"?"tagV":
           a.tag==="支付金融"?"tagG":"tagGr";
    h+='<li class="ni"><div class="nn">'+(i+1)+'</div><div class="nb">'+
      '<div class="nm"><span class="tag '+cls+'">'+a.tag+'</span></div>'+
      '<div class="ntitle"><a href="'+a.url+'" target="_blank">'+a.title+'</a></div>'+
      '<div class="ndesc">'+a.desc+'</div>'+
      '<div class="nsrc">📌 <a href="'+a.url+'" target="_blank">'+a.source+'</a> <a class="nlink" href="'+a.url+'" target="_blank">→ 阅读原文</a></div>'+
    '</div></li>';
  });
  h+='</ul>';
  document.getElementById("snapB").innerHTML=h;
  sv.classList.add("snapOn");
  window.scrollTo({top:0,behavior:"smooth"});
}
function closeSnap(){sv.classList.remove("snapOn")}
</script>
</body>
