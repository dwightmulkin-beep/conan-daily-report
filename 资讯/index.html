<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>行业资讯</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.6}
a{color:#667eea;text-decoration:none}
.hdr{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:20px 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:22px;color:#fff}
.hdr a{color:rgba(255,255,255,.85);font-size:13px}
.hdr a:hover{color:#fff}
.hdr .t{font-size:11px;color:rgba(255,255,255,.65)}
.ct{max-width:1400px;margin:0 auto;padding:24px 40px 40px}
.btns{margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid #e0e3e8;border-radius:25px;padding:10px 22px;font-size:13px;font-weight:700;color:#667eea;cursor:pointer;transition:all .2s;box-shadow:0 2px 6px rgba(0,0,0,.06);text-decoration:none}
.btn:hover{border-color:#667eea;transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.18)}
.btn img{width:16px;height:16px;opacity:.8}
.tabs{display:flex;gap:6px;padding:14px 0;border-bottom:2px solid #e8e9f0;margin-bottom:4px}
.tab{display:inline-block;padding:7px 18px;background:#f4f5f9;border-radius:20px;font-size:13px;font-weight:600;color:#6b6b80;cursor:pointer;transition:all .2s;border:none;font-family:inherit}
.tab:hover{background:#e8e9f0;color:#333}
.tab.active{background:#667eea;color:#fff}
.bc{background:#fff;border-radius:14px;padding:24px 28px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.bh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #f0f2f5;flex-wrap:wrap;gap:6px}
.bt{font-size:16px;font-weight:700;color:#1a1a2e}
.bm{font-size:12px;color:#999}
.badge{display:inline-block;background:#667eea;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;font-weight:600}
.badge-grn{background:#22c55e}
.badge-org{background:#f59e0b}
.nl{list-style:none}
.ni{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid #f5f5f8;align-items:flex-start}
.ni:last-child{border-bottom:none;padding-bottom:0}
.ni:first-child{padding-top:0}
.nn{width:28px;height:28px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.nc{flex:1;min-width:0}
.nt{font-size:15px;font-weight:600;color:#1a1a2e;line-height:1.45;margin-bottom:4px}
.nt a{color:inherit;text-decoration:none}
.nt a:hover{color:#667eea}
.nd{font-size:13px;color:#666;line-height:1.6;margin-bottom:5px}
.nm{margin-bottom:5px}
.tag{display:inline-block;padding:1px 8px;border-radius:6px;font-size:10px;font-weight:700}
.tagR{background:#fff1f0;color:#cf1322}
.tagO{background:#fff7e6;color:#d46b08}
.tagB{background:#e6f7ff;color:#0958d9}
.tagV{background:#f9f0ff;color:#722ed1}
.tagG{background:#f6ffed;color:#389e0d}
.tagGr{background:#f5f5f5;color:#595959}
.ns{font-size:11px;color:#999}
.nlk{color:#667eea;font-weight:600}
/* 时间线表格 */
.tl{width:100%;border-collapse:collapse}
.tl th{font-size:11px;color:#999;font-weight:600;text-align:left;padding:11px 14px;background:#f8f9fb;border-bottom:1px solid #e8e9f0;text-transform:uppercase;letter-spacing:.5px}
.tl td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f5f5f8;vertical-align:middle}
.tl tr:last-child td{border-bottom:none}
.tc{color:#667eea;font-weight:700;white-space:nowrap;font-size:13px}
.ti{color:#777;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mt{display:inline-block;background:#f4f5f9;color:#9090a0;font-size:10px;padding:1px 6px;border-radius:6px;margin-right:3px}
.bv{padding:6px 14px;background:#667eea;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit}
.bv:hover{background:#764ba2}
.bcur{background:#22c55e}
.bcur:hover{background:#16a34a}
.empty{text-align:center;padding:32px;color:#aaa;font-size:14px}
/* 日期分组 */
.dg{margin-bottom:24px}
.dl{font-size:14px;font-weight:700;color:#1a1a2e;padding:8px 0 8px;border-bottom:2px solid #667eea;margin-bottom:6px}
/* 弹窗 */
.md{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.md.on{display:flex}
.mb{background:#fff;border-radius:18px;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.mh{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;border-radius:18px 18px 0 0;z-index:2}
.mt2{font-size:16px;font-weight:700;color:#1a1a2e}
.cls{border:none;background:#f4f5f9;color:#555;padding:7px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.cls:hover{background:#e0e3e8}
.mbd{padding:16px 20px 24px}
.mbd ul.nl{padding:0}
.hide{display:none!important}
</style>
</head>
<body>
<div class="hdr">
  <h1>📰 行业资讯</h1>
  <div>
    <span class="t">🕒 2026-03-25 15:01 · 北京时间</span>
    <a href="../index.html">← 返回首页</a>
  </div>
</div>

<div class="ct">
  <div class="btns">
    <button class="btn" onclick="openMo()">🖼️ 查看简报图片</button>
    <a class="btn" href="历史.html">📁 历史存档</a>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabCur" onclick="showTab('cur')">📋 当前版本</button>
    <button class="tab" id="tabHis" onclick="showTab('his')">🕐 今日历史</button>
  </div>

  <div id="panCur">
    <div class="bc">
      <div class="bh">
        <div class="bt">🖼️ 对外简报 · 朋友圈素材 <span class="badge badge-grn">15:00</span></div>
        <div class="bm">更新于 2026-03-25 15:01 · 无来源链接</div>
      </div>
      <ul class="nl"></ul>
    </div>
    <div class="bc">
      <div class="bh">
        <div class="bt">📊 对内全模块 <span class="badge">0条</span></div>
        <div class="bm">更新于 2026-03-25 15:01 · 含来源链接</div>
      </div>
      <ul class="nl"></ul>
    </div>
  </div>

  <div id="panHis" class="hide">
    <div class="bc">
      <div class="bh">
        <div class="bt">🕐 今日历史版本 <span class="badge">2026-03-25</span></div>
      </div>
      <div id="tlWrap"><table class="tl"><thead><tr><th>时间</th><th>条数</th><th>首条</th><th>标签</th><th></th></tr></thead><tbody><tr><td class="tc">15:00</td><td class="ti">0条</td><td class="ti">无内容</td><td></td><td><button class="bv bcur" onclick="showSnap('15')">当前</button></td></tr><tr><td class="tc">14:00</td><td class="ti">0条</td><td class="ti">无内容</td><td></td><td><button class="bv" onclick="showSnap('14')">查看</button></td></tr></tbody></table></div>
    </div>
  </div>
</div>

<!-- 快照弹窗 -->
<div class="md" id="md">
  <div class="mb">
    <div class="mh">
      <div class="mt2" id="mdT">简报预览</div>
      <button class="cls" onclick="closeMd()">关闭</button>
    </div>
    <div class="mbd" id="mdB"></div>
  </div>
</div>

<!-- 图片预览弹窗 -->
<div class="md" id="mo" onclick="if(event.target===this)closeMo()">
  <div class="mb" style="max-width:480px">
    <div class="mh">
      <div class="mt2">简报图片预览</div>
      <button class="cls" onclick="closeMo()">关闭</button>
    </div>
    <div class="mbd" style="padding:16px;text-align:center">
      <img id="moImg" src="https://dwightmulkin-beep.github.io/conan-daily-report/%E8%B5%84%E8%AE%AF/%E7%AE%80%E6%8A%A5.png" style="width:100%;border-radius:10px;display:block" alt="简报">
      <div style="margin-top:16px;padding-bottom:8px">
        <a class="btn badge-org" href="https://dwightmulkin-beep.github.io/conan-daily-report/%E8%B5%84%E8%AE%AF/%E7%AE%80%E6%8A%A5.png" download="行业简报_2026-03-25_15h.png">⬇ 保存图片</a>
      </div>
    </div>
  </div>
</div>

<script type="application/json" id="sd">{"2026-03-25": {"14": {"articles": [], "updated": "2026-03-25 14:54"}, "15": {"articles": [], "updated": "2026-03-25 15:01"}}}</script>
<script>
var SD=JSON.parse(document.getElementById("sd").textContent||"{}");

function showTab(id){
  document.getElementById('panCur').classList.toggle('hide',id!=='cur');
  document.getElementById('panHis').classList.toggle('hide',id!=='his');
  document.getElementById('tabCur').classList.toggle('active',id==='cur');
  document.getElementById('tabHis').classList.toggle('active',id==='his');
}

function openMo(){document.getElementById('mo').classList.add('on');document.body.style.overflow='hidden'}
function closeMo(){document.getElementById('mo').classList.remove('on');document.body.style.overflow=''}
function closeMd(){document.getElementById('md').classList.remove('on');document.body.style.overflow=''}

function snapHtml(arts){
  var h='<ul class="nl">';
  arts.forEach(function(a,i){
    var cls=a.tag==="\u884c\u4e1a\u653f\u7b56"?"tagR":a.tag==="\u5e02\u573a\u89c2\u5bdf"?"tagO":
           a.tag==="\u5e73\u53f0\u52a8\u6001"?"tagB":a.tag==="\u5de5\u5177\u8bc4\u6d4b"?"tagV":
           a.tag==="\u652f\u4ed8\u91d1\u878d"?"tagG":"tagGr";
    h+='<li class="ni"><div class="nn">'+(i+1)+'</div><div class="nc">'+
      '<div class="nm"><span class="tag '+cls+'">'+a.tag+'</span></div>'+
      '<div class="nt"><a href="'+a.url+'" target="_blank">'+a.title+'</a></div>'+
      '<div class="nd">'+a.desc+'</div>'+
      '<div class="ns">&#128214; <a href="'+a.url+'" target="_blank">'+a.source+'</a> <a class="nlk" href="'+a.url+'" target="_blank">&#8594;</a></div>'+
    '</div></li>';
  });
  return h+'</ul>';
}

function showSnap(hr,ds){
  ds=ds||"2026-03-25";
  var TD=SD[ds]||{};
  var sp=TD[hr];
  if(!sp){alert("\u6570\u636e\u4e0d\u5b58\u5728");return}
  var arts=sp.articles||[];
  document.getElementById('mdT').textContent=ds+' '+hr+':00 ('+arts.length+'\u6761)';
  document.getElementById('mdB').innerHTML=snapHtml(arts);
  document.getElementById('md').classList.add('on');
  document.body.style.overflow='hidden';
}

document.addEventListener('keydown',function(e){
  if(e.key==="Escape"){closeMd();closeMo()}
});
</script>
</body>
</html>
