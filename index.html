<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conan日报 - 密码验证</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .login-container {
    background: white;
    padding: 50px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
  p { color: #666; margin-bottom: 30px; font-size: 14px; }
  input[type="password"] {
    width: 100%;
    padding: 15px 20px;
    font-size: 16px;
    border: 2px solid #ddd;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.3s;
    margin-bottom: 15px;
  }
  input[type="password"]:focus { border-color: #667eea; }
  button {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
  .error { color: #ff4d4f; margin-top: 15px; font-size: 14px; display: none; }
  .hint { color: #999; font-size: 12px; margin-top: 20px; }
</style>
</head>
<body>
<div class="login-container">
  <h1>🔐 Conan日报</h1>
  <p>请输入访问密码</p>
  <input type="password" id="password" placeholder="输入密码后按回车..." onkeypress="handleEnter(event)">
  <button onclick="checkPassword()">进入日报</button>
  <div class="error" id="error">密码错误，请重试</div>
  <div class="hint">密码请联系Conan获取</div>
</div>

<script>
const CORRECT_PASSWORD = 'conan2026'; // 可修改密码

function checkPassword() {
  const pwd = document.getElementById('password').value;
  const error = document.getElementById('error');
  if (pwd === CORRECT_PASSWORD) {
    window.location.href = 'dashboard.html';
  } else {
    error.style.display = 'block';
    document.getElementById('password').value = '';
  }
}

function handleEnter(e) {
  if (e.key === 'Enter') checkPassword();
}
</script>
</body>
</html>
