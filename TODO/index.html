<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的TODO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 22px; }
  .header a { color: white; text-decoration: none; font-size: 14px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }
  .section { background: white; border-radius: 12px; padding: 25px 30px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .section-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
  .todo-item { padding: 15px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
  .todo-item:last-child { border-bottom: none; }
  .todo-status { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #ddd; }
  .todo-status.done { background: #52c41a; border-color: #52c41a; }
  .todo-status.progress { background: #faad14; border-color: #faad14; }
  .todo-content { flex: 1; }
  .todo-title { font-size: 14px; color: #333; }
  .todo-title.done { text-decoration: line-through; color: #999; }
  .todo-meta { font-size: 12px; color: #999; margin-top: 3px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .tag-red { background: #fff1f0; color: #ff4d4f; }
  .tag-yellow { background: #fffbdd; color: #faad14; }
  .tag-green { background: #f6ffed; color: #52c41a; }
</style>
</head>
